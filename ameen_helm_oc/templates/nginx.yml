apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
  namespace: {{ .Values.namespace }}
  labels:
    app: nginx-web
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nginx-web
  template:
    metadata:
      labels:
        app: nginx-web
    spec:
      containers:
      - name: nginx
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports:
          - containerPort: {{ .Values.nginx.service.targetport }}
        volumeMounts:
          - name: nginx-volume
            mountPath: /usr/share/nginx/html
      volumes:
        - name: nginx-volume
          configMap:
            name: nginx-html-config