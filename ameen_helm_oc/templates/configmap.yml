apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html-config
  namespace: {{ .Values.namespace }}
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Welcome to OpenShift</title>
        <style>
            body { font-family: sans-serif; text-align: center; margin-top: 10%; background-color: #f3f4f6; }
            h1 { color: #cc0000; }
        </style>
    </head>
    <body>
        <h1>Hello from OpenShift!</h1>
        <p>This page is successfully running inside the project <strong>{{ .Values.namespace }}</strong>.</p>
        <p>Deployed seamlessly via the Fedora Linux VM CLI.</p>
    </body>
    </html>